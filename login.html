<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Smart Study Planner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">📚 Smart Study Planner</div>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="login.html" class="active">Login</a></li>
                <li><a href="register.html">Register</a></li>
            </ul>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <!-- Login Section -->
    <div class="auth-container">
        <div class="auth-form-section">
            <h1 class="form-title">Welcome Back!</h1>
            <p class="form-subtitle">Login to your Smart Study Planner account</p>
            
            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>

                <div class="form-checkbox">
                    <input type="checkbox" id="remember" name="remember">
                    <label for="remember">Remember me</label>
                </div>

                <button type="submit" class="btn-submit">Login</button>
            </form>

            <div class="form-footer">
                <p>Don't have an account? <a href="register.html" class="link-text">Sign Up Here</a></p>
                <p><a href="#" class="link-text">Forgot your password?</a></p>
            </div>
        </div>

        <div class="auth-image-section">
            <img src="https://source.unsplash.com/500x600/?student,learning" alt="Login">
            <div class="image-overlay">
                <h2>Your Study Journey Starts Here</h2>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2026 Smart Study Planner. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
