<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Smart Study Planner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="logo">📚 Smart Study Planner</div>
            <ul class="nav-menu">
                <li><a href="index.html">Home</a></li>
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="login.html">Login</a></li>
                <li><a href="register.html" class="active">Register</a></li>
            </ul>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <!-- Register Section -->
    <div class="auth-container">
        <div class="auth-form-section">
            <h1 class="form-title">Join Us Today!</h1>
            <p class="form-subtitle">Create your Smart Study Planner account</p>
            
            <form id="registerForm" class="auth-form">
                <div class="form-group">
                    <label for="username">Full Name</label>
                    <input type="text" id="username" name="username" required>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" required>
                </div>

                <div class="form-checkbox">
                    <input type="checkbox" id="terms" name="terms" required>
                    <label for="terms">I agree to the Terms and Conditions</label>
                </div>

                <button type="submit" class="btn-submit">Create Account</button>
            </form>

            <div class="form-footer">
                <p>Already have an account? <a href="login.html" class="link-text">Login Here</a></p>
            </div>
        </div>

        <div class="auth-image-section">
            <img src="https://source.unsplash.com/500x600/?education,books" alt="Register">
            <div class="image-overlay">
                <h2>Start Your Learning Adventure</h2>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <p>&copy; 2026 Smart Study Planner. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
